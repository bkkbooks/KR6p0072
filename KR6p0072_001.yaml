body:
  text: 雲棲會下妙意庵廣貴輯淨願社釋玄顒堂陳韓補如來弘願序悲華經載往昔因中阿彌陀佛為轉輪王釋迦佛為大臣同於寶藏佛所發弘誓願輪王願於清淨安樂世界攝受衆生大臣願於五濁苦惱世界度脫衆生以此君臣弘願無窮無盡所以二如來為兄弟沙彌時同以法華教度衆生而三乘授道之外有度未盡者度在彌陀故出此淨土一門一推一挽共成道化以故釋迦佛四十九年設大乘經中恆歸宿此一門而會上單拈淨土一門者尤諄諄不已即如世間朝夕所誦一卷彌陀經文句簡約然一則曰衆生聞者應當發願願生彼國再則曰衆生聞是説者應當發願生彼國土而又曰若有信者應當發願生彼國土其言極樂國土成就如是功德莊嚴者一見二見三見四見其言汝等衆生當信是不可思議功德一切諸佛所護念經秦譯六見至唐譯十方佛讚歎後則十見之而又曰汝等皆當信受我語及諸佛所説味其語氣恨不將此數語充滿一切衆生之耳恨不將此數語鑽入衆生之肺腸愛何其切慮何其深悲何其至即父母於至愛之子晨夕付囑亦未必如此之惓切也何以故蓋世間父母付囑子孫不過望其成家立業已耳至於如來見衆生不入此門必墮鑊湯鼎沸之中得失匪細則衆生不念佛悲安得不深衆生念佛自然攝取不舍論云譬如魚子母若不念子則爛壞佛若不念衆生善根亦壞所以無量壽佛經言當來之世經道滅盡我以慈愍特留此經更住百歲又云此經滅後佛法全無但留阿彌陀佛四字名號救苦衆生世上君臣兄弟能以淨土相成設化衆生皆是從彌陀釋迦弘願中流出如來弘願第一西方詠一元西方化主度迷情佛力加持道易成撒手便行無異路最初一步要分明西方只要辦心堅努力勤修速向前順水行船加櫓棹導師接引願繩牽西方今古鎮長存慈父哀憐度子孫八萬四千門路別彌陀一句衆稱尊西方大聖法中王接引羣迷放寶光不憚疲勞弘願重常遊苦海駕慈航西方有佛號彌陀普度衆生出愛河六八願門通九品人人可到莫蹉跎西方大道理綿長功德巍巍不可量非但釋迦開此路恆沙諸佛盡稱揚西方慈父動悲哀接引迷流歸去來早向蓮臺親托質莫投凡世入胞胎懷淨土中峯藕池無日不華開四色光明映寶臺金臂遙伸垂念切衆生何事不思來動地驚天勤念佛捶門打戶勸修行開渠因甚麼如此只怕衆生入火坑十願弘深不可量心心念念廣宣揚彌陀有願終須到四色蓮花遍界香阿彌陀佛法中王愛河浪裏作舟航一心願度沉淪輩盡到西方極樂六方佛出廣長舌俱讚娑婆念佛人須信白蓮花世界無時不散劫壺春阿彌陀佛讚淨土教主號彌陀四十八願利娑婆九品咸令登彼岸願度衆生出愛河頌以無緣慈攝受衆生妙意梅花落盡杏花開豈是春風著意吹一氣不言含有象萬靈何處謝無私頌一一光明遍照十方世界念佛衆生攝取不捨寂光影裏現全身遍界光明逈出倫浪暖桃花魚憶子無緣慈度有緣人一點悲心劈不開鑊湯滾處笑盈腮希奇之事朕深信見與君王説法來彌陀像贊沈芝塘飢當餱糧渴當茶湯病當醫藥裸當衣裳無邊苦海化作津梁無明暗室照見燈光途窮日暮回到家鄉炎天暑熱吹來風涼水火盜賊凶不相妨蚖蛇蝮蝎毒不能傷逢人濟度隨處禎祥是慈悲父是大願王人命呼吸迅速無常心心相印念念不忘高超上品穩坐慈航往生下品猶勝天堂垂手接引同到西方苦勸回韁序佛言得人身者如指上土失人身者如地上土雖信佛語未知其故至讀楞嚴經言一切衆生六識造業所招惡報從六根出惡業圓造者入阿鼻六根各造兼境兼根者入無間身口意三作殺盜淫入十八獄三業不兼者入三十六獄一根單犯者入一百八獄地獄中歷劫燒然罪畢方受鬼形鬼業既盡方與世間元負人怨對相值為畜生以酬宿債三途綿遠如此至較量壽命經所載地獄壽命活地獄一晝夜比較人間算數一萬六千二百俱胝年獄愈進時愈久地獄一道壽命之長又如此則善知識所言一失人身萬劫難與出得頭來是幾時之語豈非刳心剖腸痛哭流涕之言也哉今世上人求其六根清淨不犯一業者幾人則茫茫塵世大抵皆地獄之因耳求其為餓鬼畜生尚不能得豈可不寒心哉楞嚴中載畜生中業報用錢役力償足自停若殺其命或食其肉經微塵劫相食相誅互為高下無有休息食肉之轉徙為如此然則我輩此一副面孔一旦失之復生何年凡此等之苦我輩凡眼不能自見唯如來悉知悉見安得不惓惓切切千言萬語苦口向人可憐平日不念佛之人在地獄苦難之中亦不能念佛近有活閻羅王公教地獄人念佛但能念一句阿彌陀佛即與出獄而口噤不能吐一佛字不信心之障重如此大智度論云有諸菩薩自念謗大般若身墮惡道歷無量劫雖修餘行不能滅罪後遇善知識教令念阿彌陀佛乃得滅障超生淨土然則吾輩業海中衆生除却一句阿彌陀佛更從何處生活苦勸回韁第二警世跋陀羅不結良緣與善緣苦貪名利日憂煎豈知住世金銀寶借汝間看幾十年警世迦哩迦愛欲牽繼沒了期日生煩惱鎮相隨官中囹圄猶存赦家業拘牽沒赦時警世半託迦地水火風化此身身滅四大各歸真諸魔六賊皆消散苦樂前程祇主人勸念佛偈善導漸漸雞皮鶴髮看看行步龍鍾假饒金玉滿堂難免衰殘老病任你千般快樂無常終時到來唯有徑路修行但念阿彌陀佛古詩龐道玄一年復一年務在且遷延皮皺顏色減髮白髓枯乾毛孔通風過骨消椽梠寬水微不耐熱火少不忍寒幻身如聚沫四大亦非堅更被癡狠使無明曉夜煎惟知念水草心神被物纏云何不懺悔便道捨財錢外頭遮曲語望得免前愆地獄應無事準擬得生天世間有這屬冥道不如然除非不作業當拔罪根源根空塵不實內外絶因緣積罪如山嶽慧火一時燃須臾變灰燼永劫更無煙觀地獄圖貫休峨峨非劒閣有樹豈堪攀佛手遮不得人心似等間周王應未雪白起作何顏盡日空彈指忙忙塵世間警世慈受漁者不能獵獵者不能漁貴人錢為網水陸皆可圖畜生肉嘗遍諸佛心轉踈黃泉途路滑失腳恐難扶又美食意生貪粗食心起怒喃喃嗜飽滿殊不知來處人生一飯間貪嗔癡悉具智者善思惟莫為餔啜誤勸衆念佛鬢髮看看染雪霜心猿意馬尚顛狂一朝掩目歸空去始信泥犂歲月長業報差殊事不同勞生無地出樊籠欲知自性彌陀佛在汝朝昏一念中不是山僧説是非修行魔事要君知直須緊峭草鞋底透過娑婆五欲池警下品沖默愚流習惡久成風平昔那知黑白蹤直待垂終諸業現方驚己困四蛇攻自非夙善熏聞力安得稱名勇猛功陡覺涼風吹業火玉毫光裏面金容讚淨土北山四色蓮華間緑荷一蓮華載一彌陀莫疑淨土程途遠日日人生雨點多暮鼓晨雞不住催逡巡容貌變衰頽莫言白髮渾間事總是無常信息來西方詠一元西方諦信莫生疑念佛修行要及時有限光陰宜早辦骷髏著地幾人知西方有路少人登一句彌陀最上乘把手牽他行不得但當自肯乃相應西方故國早回還人命無常呼吸間有限光陰當愛惜今生蹉過出頭難西方急急早修持生死無常不可期窗外日光彈指過為人能有幾多時西方步步踏蓮華指路開門謝釋迦三復丁寧無別説一心念佛早歸家西方直指易修持本性彌陀孰得知六道三塗生死轉思量怎不痛傷悲西方易到可修行十念精專便往生奉勸世人男共女大家速急趲歸程西方功德與天齊反謗彌陀是闡提地獄墮身無量劫不知何日醒羣迷西方不到果然艱一失人身力拔山分付世間英烈漢急須採寶莫空還淨土詩中峯塵沙劫又塵沙劫數盡塵沙劫未休當念只因情未撇無邊生死自羈留四大聚成玄兔角六根縛住白龜毛漚花影裏翻筋斗出沒閻浮是幾遭東海一丸紅彈子流光日日射西林世間多少奇男子誰向窗前惜寸陰血池乾處藕池清劒樹枯時寶樹榮苦樂本來無住相於無住處自圓成佛與衆生夙有緣衆生與佛性無偏奈何甘受娑婆苦不肯回頭著痛鞭人間天上與泥犂勞我升沉是幾時白藕有根如不種塵沙生死自羈縻自家一個彌陀佛論劫何曾著眼看今日更隨聲色轉這回欲要見還難人間五欲事無涯利鎖名韁割不開若把利名心念佛何須辛苦待當來深思地獄發菩提父母家鄉勿再迷痛䇿歸鞭宜早到莫教重待日移西七月人間暑漸衰晚風池上更相宜遙觀落日如懸鼓便䇿歸鞭已較遲臘盡時窮事可憐東村王老夜燒錢即心自性彌陀佛滿面塵埃又一年寄語娑婆世上人要尋歸路莫因循銀山鐵壁如挨透千葉蓮花別是春念佛不曾妨日用人於日用自相妨百年幻影誰能保莫負西天老願王富貴之人宜念佛黃金滿庫穀盈倉世間受用無虧缺只欠臨終見願王貧乏之人念佛時且無家事涉思惟赤條條地空雙手直上蓮臺占一枝老來念佛正相當去日無多莫暫忘南無阿彌陀六字是名越苦海慈航盡道少年難念佛我云年少正相當看他八歲龍王女掌上神珠放寶光身膺宰輔與朝郎蓋世功名世莫量自性彌陀如不念未知何以敵無常一等師家每勸人自心三昧不精勤身居淨白蓮華土空把彌陀播口唇一般平等惟心土貴賤賢愚沒兩途漆桶要教連底脫大家齊用著工夫便就今朝成佛去樂化主已嫌遲那堪更欲之乎者管取輪回沒了期四蛇同篋險復險二鼠侵藤危更危不把蓮花栽淨域未知何劫是休時諸苦盡從貪欲起不知貪欲起於何因忘自性彌陀佛異念紛馳總是魔愛河渺渺廣無邊六根繩纜要牢堅一心繫著菩提岸舉步高登般若船警世茶傾三奠復三奠一個骷髏燒未乾業識又鑽皮袋去鐵人聞也骨毛寒警世石屋茅簷雨過日頭紅瞬息陰晴便不同況是死生呼吸事黃昏難保聽朝鍾勸世念佛頌無名殺業冤家漸債多將何詞理見閻羅教君一路超生法不如知悔念彌陀勸念佛優曇生死忙忙古渡頭彌陀撥動度人舟夙生有分今生遇快上船來歸去休一念心迷有萬端塵勞業識輥成團若非猛烈英靈漢透出頭來也是難我念彌陀不問禪只圖口快要爭先幸然有個遼天鼻却被無明業子穿老來死至怎生醫樂土風光誰得知到者同名無量壽因從此界念阿彌法身清淨本無塵無奈衆生造業因地獄三途甘受苦分明有理不曾伸警悟委骸回視積如山別淚翻成四海瀾世界到頭終有壞人生彈指有何歡成男作女經千遍帶角披毛歷萬端不向此生生淨土投胎一錯悔時難念佛偈廣製佛在心中須著眼莫拋腦後不相看此時蹉過真成錯欲似今朝恐大難望江南白雲娑婆苦身世一浮萍蚊蚋睫中爭小利蝸牛角上竊虗名一點氣難平人我盛日夜長無明地獄爭頭成隊入西方無箇肯修行空死復空生娑婆苦光影急如流龐辱悲歡何日了是非人我幾時休生死路悠悠三界裏水面一浮漚縱使英雄功蓋世祇留白骨掩荒丘何似早回頭懷淨土楚石少年頃刻老還衰須信無常日夜催九十六家邪智慧百千萬劫受輪回不存寶界華池想爭得刀山劒樹摧但自淨心生極樂此中聖賢許追陪佛袈裟下失人身重得人身有幾人萬行不如修白業一心何苦戀紅塵法王立誓邱山重迷子思歸涕淚頻若解反觀觀自性拋來擲去總家珍娑婆生者極愚癡衆苦縈纏不解思在世更無清淨業臨終那有出離時百千經裏殷勤勸萬億人中一二知珍重大仙金色臂早來携我入蓮池忙裏偷間亦在人人生誰滿百年春送迎畢竟無時了悲喜交煎逐日新休念功名惟念佛但憂道業勿憂貧忽然鐵樹開花也妙轉如來正法輪大患明明為有身須知疾病不饒人但關妄想無非妄縱得真仙未是真衆熱聚來風扇火一期拋去骨纏筋唯餘念佛離生死只戀閻浮化作塵罪重無如殺盜淫身囚犴獄口呻吟敲枷打鎖能稱佛覆地翻天莫變心夜半從教神鬼嘯空中自有聖賢臨收因結果蓮臺上自性彌陀不外尋淨土詩度門高才弘略氣非常那箇臨時不著忙打雨敲風問計較驚天動地漫文章愛河如未乾枯竭淺浪還須作主張六字彌陀無注腳歸依即是大慈航勸修淨土雪嶠行船分付把梢婆須識長河逆順波只怕順風吹過火轉來不得逆風多頌下品中下生妙意下品中生者命欲終時地獄衆火一時俱至遇善知識開示念佛生西六劫華開菩薩説法下生者命終應歷劫受苦遇善知識開示十念往生十二大劫華開菩薩説法知識相逢豈易求危哉浪海此浮漚斜陽欲落未落處盡是離人今古愁稱佛名故於念念中除八十億劫生死之罪鐵狗銅蛇正奮瞋風刀火鋸肉成塵一聲佛號翻身去回首何曾見舊人雞聲茅店月華明客夢沉迷尚未醒開得眼來天大曉蓬頭垢面奔前程即此心識造地獄即此心識見佛成佛因地而倒因地起離地求起無是理不離濁水與污泥出頭仍是蓮華地總頌下品三生多生結得善根由幸免無邊苦海愁早知大劫都盧坐悔不娑婆勇猛修淨土偈蕅益西方即是惟心土緣具方能了正因忍慧互資成戒品明珠獲惜不宜輕西方即是惟心土未到西方深可危夙障已如波浪湧那堪新業又相隨西方即是惟心土悲智相應始克生莫謂大悲應憫濁化他須是自功成西方即是惟心土三昧中王道最微瞥爾生疑千古隔咬釘嚼鐵莫依違懷淨土詩蓮隱攝心快向樂來莫待無常老病催若使此生重蹉過難逃永劫墮輪回天邊落日勤修觀世上空花不用栽念念直前無退怯寶池坐看一蓮開殘月鍾聲欲曉天如何高枕尚安眠請看竹馬風鳶日忽到頭童齒豁年休逐世波沈黑業快稱佛號育青蓮樂歸去須歸去莫待他人把手牽勸念佛沈芝塘生死不能了勞勞何日休勸君早念佛即此是回頭富貴與貧賤人生境不同萬般都有盡念佛福無窮忙裏偷間念人人做得來臨終方應驗淨土有蓮臺翻然嚮往序古德云衆生處五濁惡世如囚處獄雖罪有輕重然無有一人不苦者夫地獄餓鬼之苦猶云隔世而未知也畜生之苦猶云隔胎而未知也生老病死愛別離冤憎會苦猶云人生變態未必時時然也只如安常處順在家庭之間有何趣味法苑舉婆娑所言家居之可厭惡甚詳姑撮其一二有云家是難滿如海吞流家是無足如火焚薪家是苦性如冤詐親家是鬪亂共相違諍家是多瞋呵責好醜家是伎人種種妄飾家如眼夢富貴則失家如朝露須臾變滅家如棘藂欲刺傷人此世間有身家者所共嘗之滋味也然乎不然乎故要集舉涅槃云在家迫迮猶如牢獄一切煩惱因之而生無已則剃髮披緇可以無纍歟古德云為僧心了總輸僧若其心了豈不超然大丈夫也哉如其不了與俗何異而罪過尤細罪福決疑經論錢穀因果之事如施主擬作釋迦改作彌陀擬作大本改充涅槃之類即計錢多寡論罪莊椿云盜用常住一文錢一日一夜長三分七釐利第二日夜利又長利蓋共三分七釐之利又起利也來世作牛馬償之牛日還八文馬日還七文所以云作一生之容易為萬劫之艱難由此推之為僧者可不惕然畏乎以此左推右測惟有淨土一門任意早脫終無再住閻浮之法又瑞應經佛言吾無數劫時本為凡人初求佛道以來受形五道生死無量計吾故身不能以數夫釋迦佛學佛之後尚不免五道況學他道者乎惟生淨土者決不退轉但受持彌陀經者發念欲生阿彌陀佛國者釋迦佛皆許以不退轉則此法門之利益於佛道中又為最勝故古德云修淨土者宜發願云吾自從無始以來不曾持此法門以故輪回六道不得出離今日知之豈肯不即時下手翻然嚮往第三淨土詩謝靈運法藏長王宮懷道出國城願言四十八弘誓拯羣生淨土一何妙來者皆菁英頽年欲安寄乘化好晨征病中畫西方變相願白香山極樂世界清淨土無諸惡道及衆苦願如我身病苦者同生無量壽佛所送臻師李商隱苦海迷途去未因東方過此幾微塵何當百億蓮華上一一蓮華見佛身畫阿彌陀佛像讚蘇東坡錢塘元照律師普勸道俗歸誠西方極樂世界眉山蘇軾敬捨亡母蜀郡太君程氏簪珥遺物命匠胡錫畫阿彌陀佛像追薦冥福以偈頌曰佛以大圓覺充滿十方界我以顛倒想出沒生死中云何以一念得往生淨土我造無始業一念便有餘既從一念生還從一念滅生滅滅盡處則我與佛同如投水海中如風中鼓槖雖有大聖智亦不能分別願我先父母及一切衆生在處為西方所遇皆極樂人人無量壽無去亦無來發願偈臨終生死猶如臂屈伸情鍾我輩一酸辛樂天不是蓬萊客憑仗西方作主人勸修淨土頌長蘆三界炎炎如火聚道人未是安身處蓮池勝友待多時收拾身心好歸去目想心存望聖儀直須念念勿生疑他年淨土華開處記得娑婆念佛時西方詠一元西方易到莫沉吟只要當人辦肯心彈指已超生死海有緣得遇芥投針西方徑路好修行勇猛加工速趲程九品蓮臺都有分華開早晚悟無生西方一著莫遲延抖擻精神速向前休待渴來才掘井只宜早趂白蓮船西方精進莫遲延一墮疑城五百年大聖放光來照破重歸淨土禮金仙西方及早向前修間是間非一筆勾放下身心勤念佛也無煩惱也無憂淨土詩許自新同仗彌陀力齊登方便船樂容易到却勝苦參禪往生偈馮氏法信隨緣任業許多年枉作老牛為耕田打疊身心早歸去免教鼻孔受人穿懷淨土中峯清旦黃昏禮懺摩低頭泣告老彌陀輪回六趣知多少誓欲今番出網羅勸念佛優曇人間四相難逃死天上何曾免五衰寧可九蓮居下品不來浮世受胞胎長生不用神仙訣救急還須海上方靠著主人無量壽算來都勝別思量幾多失腳走閻浮世事如麻日轉稠故國田園埋草裏野牛放蕩幾時休懷淨土楚石一自飄蓬贍部南倚樓長歎月纖纖遙知法會諸天繞正想華臺百寶嚴此界猶如魚少水微生只似燕巢簷同居善友應懷我已築浮屠欠合尖淨土詩雪嶠林下長開佛面花子規呌血數珠斜耳邊多少間題目賺煞春風不到家溪上行歌杖紫藤落花沒膝呌黃鶯春池無月空撈漉早叩蓮題姓名淨土詩專愚南北東西求所知怖頭認形總成迷直饒悟得聲前事也要彌陀作導師十方諸佛讚西方不是無端出廣長只恐癡禪耽寂滅錯將斷滅作真常寂光未異莊嚴土向上不為斷滅禪細細蟲音宣法界佛聲豈背未生前懷淨土詩沈朗倩生無生法不須疑苦向嚴陵掌上推收拾金錢提槵子六爻皆吉是阿彌淨土偈蕅益西方即是惟心土淨戒堅持莫使疏人世總皆局蹐境不須旅邸覓安居西方即是惟心土功行應教日日鮮一息不存誰努力豈將精進遜先賢淨土偈永覺才生一念便生纏攝念無如念佛先直把娑婆全放下育神端在紫金蓮念佛偈聞學願力如山重往生似羽輕見知融一念無量佛名經懷淨土詩蓮隱漸看鬚髮著霜痕自省己非自討論一世竟成何事業百年還有幾朝昏便須立志求安宅休更甘心赴死門樂國不遙歸有路蓮臺好去覲慈尊勸念佛沈芝塘認得今朝是方知昨日非修行原甚易何不早皈依一意西馳序世間念佛者多見佛者少知有淨土者多生淨土者少何也意不一故也蓋意為第六識本宜為五識之主而耳目口鼻爭以嗜好誘之意反為五識之奴奴之既熟雖五識無感之時不來役意而紛紛擾擾無有寧所以全不知念佛者自然隨六根而受地獄之報其知有佛法福罪兼行者縱得人身亦仍來此樊然不淨之世界而已惟一意西馳者純是一心為主故能感果于西方君王即是如來作以心為君者以佛為君此孟子所謂先立其大小不能奪觀經所謂即心作佛即心是佛雖正解不盡如是亦可旁通於此矣雲棲云一心不亂者心王心所無所不一夫心王心所雖有八與五十一之紛雜然遡流窮源不出一心今念佛人初以耳識聞彼佛名次以意識專注憶念以專念故總攝六根眼鼻舌身之識皆悉不行念之不已念極而忘所謂恆審思量者其思寂焉忘之不已忘極而化所謂真妄和合者其妄消焉則七識八識亦悉不行主既不行從者焉附其五十一又何論也當爾之時巨浪微波咸成止水濃雲薄霧盡作澄空豈非現在之西方乎一意西馳第四無量壽佛讚大智八萬四千之妙相得非本性之彌陀十萬億剎遐之方的是惟心之淨土淨穢雖隔豈越自心生佛乃殊寧乖己性心體虗曠不礙往來性本包容何妨取捨是以舉念即登于寶界還歸地産之家鄉彈指仰對於慈容實會天真之父子幾生負德枉受沉淪今日投誠必蒙拯濟三心圓發一志西馳盡來際以依承歷塵劫而稱讚懷安養故鄉詩樝庵幾年衣袂惹京塵志氣凌雲莫自伸南鴈數聲鄉夢斷秋風終夕淚痕頻此回若不懷歸計向後從誰結善鄰請看路傍埋朽骨其中多是未歸人昔年容易別瓊樓本也無心作遠遊豈意而今髮垂雪片懷常挂月西鉤枕中忽聽思歸鳥檻外頻驚落葉秋一炷檀煙一聲磬等間遙望淚橫流憶佛軒詩雪溪自古有言人生百歲七十者稀豫六十祝髮叨預僧列今幸七十處世非久朝夕人耳平居非不誦經課佛猶恨未為專注遂取首楞嚴勢至章若人憶佛念佛現前當來必定見佛之語命小軒曰憶佛庶幾以為臨終見佛先容耳且作山偈以繫於左隨波逐浪去翩翩彈指聲中七十年豈不向來知憶佛欲從老去更加鞭掃除意地空空已煥發心華燦燦然決定此身如許見風埃蟬蛻笑談邊有盟晚景欲重尋惟是拳拳憶佛心數縷香消春塢冷一龕燈伴夜窗深破畦蔬雨滋香積落澗松風發妙音自恨不歸甘自棄既歸安用越人吟三椽老去許安貧佳處無如憶佛真萬事了知猶墮甑百年惟此可書紳巖間靜寄蒲團夜松下聊供茗碗春閉戶不忘常憶佛願常終似影隨身平日叢林見祖師還如憶佛在今時但安谷底三椽地不挂𮌎中一縷絲幽徑落花浮澗水小窗斜日下松枝寂然真境知誰見惟佛嘗多入夢思早尋史漢學為文自許平生在博聞棄置寸陰隨逝水思量于我竟浮雲間中自識藏身穩勝處誰知憶佛勤沈謝曹劉今底處草萊三尺但荒墳我欲今身見佛來佛今于我豈悠哉但能一念心無倦不假三祇眼便開紫燕黃鸝啼妙旨清溪白石示珍臺要知成現還家路誰道無人為挽回名利毛繩截骨仇漆園猶自比蝸牛浮生最是無雙處憶佛須知第一籌母子但能同室住風塵安用遠方遊前程罷問從今始紙帳蒲團穩坐休多年逃逝𩬆如絲憶佛難忘十二時咄咄自嗟為蕩子幾番花落路傍枝自憐憶佛暮年深除佛無能寫我心誰道萬金為客好終非一飯在家村懷西方詩北山已知今是昔何非深掩柴門到落暉竹尾輕搖新月上簾腰半捲宿雲歸山林氣味盈懷抱松柏香煙滿布衣一片蒲團常燕坐寸心西趂落霞飛西方詠一元西方不遠莫他求一句彌陀作話頭但得盡生無別念蓮華佛國任君遊西方佛國勝生天亦勝蓬萊有漏仙亦勝王侯并富戶要知亦勝坐癡禪西方快樂勝天宮壽命難量福不窮無信衆生顛倒謗有緣佛子道相同西方景致勝蓬萊服氣餐霞養禍胎莫學出神修煉法直教枯木放華開西方富貴勝王侯種種莊嚴事事周但辦肯心求彼國輪回惡道一齊休西方滿眼是蓮華百寶莊嚴富可誇諸上善人俱一處不知其數倍恆沙西方捷徑易求生只在當人一念誠精進再加修福慧金臺上品得標名西方端的是吾家一句彌陀路不差信得及時行得實直教鐵樹也開華西方受用勝豪家七寶池中四色華衣食現成非造作光明相好絶纖瑕懷淨土中峯朝參暮禮效精勤金沼蓮胎入夢頻粉骨碎身千萬劫未應容易報慈親六時叩問黃金父赤子飄零幾日歸話到輪回無盡處相看不覺淚沾衣兄呼弟應念彌陀要與渾家出愛河辦得此心常與麼直教佛不奈伊何昔有士夫吳子才扣棺日日喚歸來雖然迹未離三界已送神栖白藕胎船上西來憶故鄉四花池上晚風涼飄零不奈歸心切一片輕帆挂夕陽念佛須期念到頭到頭和念一齊收娑婆苦海風濤靜穩泛樂紅藕舟要結蓮華會上緣是非人我盡傾捐無時不作難遭想歡喜同登解脫船為存愛見起貪嗔埋沒黃金丈六身今日幸然歸淨社不應仍舊惹風塵要將穢土三千界盡種西方九品蓮仔細思量無別術只消一個念頭堅不懸艾虎慶端陽惟向西方古道場一炷爐薰一聲磬六門風遞藕花香懷安養日觀夢中哭向佛願早死便得小小蓮華開永超生死窟夢中哭向老金仙願賜冥熏助著鞭金沼蓮華無數有定生一朵免垂涎聞道西方事宛然此行須藉好因緣磨教一念明如鏡不怕彌陀不現前長把身心看夕陽夕陽收處藕華香水禽風樹知豫意惆悵人間夢未忘三十六策走為上一二萬聲死為期浮世光陰能幾在晚香燒罷憶金池直上高樓望故鄉金烏落處暮雲蒼懸知父母哀憐久腸斷飄萍在遠方生死循環那可逃此心未了漫徒勞如今不做輪回夢只走人間這一遭生人要結死人緣活者須參亡者禪莫把泥團穿一串黑糊塗地入黃泉淨土詩落日西方散紫霞心地澄淨現蓮華擡頭便是家鄉路不信生疑隔海涯懷淨土楚石日夜思歸未得歸天涯客子夢魂飛覺來何處鴈聲過望斷故鄉書信稀幾度開窗看落月一生依檻送斜暉黃金沼內如船藕想見華敷數十圍曾聞白鶴是仙禽日日飛來送好音便欲寄書諸善友定應知我一生心長思樂土終歸去肯執蓮臺遠訪臨百歲真成彈指頃娑婆只恐世緣深琉璃地列紫金幢翡翠樓開白玉窗文字可誇才不稱肉身未到意先降能言孔知多少善語頻伽定幾雙清夢正貪歸路直夜闌無奈鼓逢逢人生百歲七旬稀往事回觀盡覺非每哭同流何處去間拋淨土不思歸香雲瑪瑙階前結靈鳥珊瑚樹裏飛從證法身無病惱況餐禪悅永忘飢莫將胎獄比華池早向池中占一枝却坐大華成佛子何煩慈母浴嬰兒口餐法喜真肴膳心得明門妙總持般若臺前定回日令人長憶鴈門師淨土詩笑巖蓮土醫王妙藥多而今盡付在娑婆昨曉親入病夫口受用如何説似他欲作西方極樂人如遭大病才將好緣思伎倆不能生稱體蓮華香杲杲竭誠一念力全提似夢全身墮水泥拽開念頭忙眨眼桃花笑入武陵溪紅輪沒處是吾家只恐當機一念差導者未來忘去著乾坤是箇黑蓮華懷淨土古溪自南自北走風塵回首西方入夢頻念佛每依芳草渡歸心常到藕華濵可憐杜宇千聲切怎似彌陀一句親不學溈山行異類寧栖淨土且為民淨土詩追思父母未生前痛徹心頭得幾年面目昨來遭毒手一腔熱血葬青蓮淨土詩專愚貧室多為兒女苦家饒又慮子孫稀道人飯罷無餘事西望白雲片片飛淨土詩晦夫樓閣重重鸚鵡洲幾人到此自悠悠清江一曲離情調你若無心我也休淨土詩丁蓮侶千劫升沉事可嗟須彌散骨亂如麻于今自覺知慙愧淚眼晨昏只憶家淨土詩沈朗倩蓮花不褁六塵胎日月籠中自剪裁拚此一堆窮骨子這場春夢要親推放步須尋百尺竿男兒特地斬樓蘭等間踏遍椎心土未許花前立馬看淨土偈蕅益西方即是惟心土不識西方豈識心何事謬希圓頓解却將落葉作黃金西方即是惟心土篤信西方即信心念念若開圓頓解不須離教自玄深西方即是惟心土擬撥西方理便乖極樂一塵同剎海假饒天眼未知涯西方即是惟心土土淨方知心體空一切境風猶挂念云何妄説任西東西方即是惟心土像季尤為法海梁信念剎那能甫具珍池已覺寶花香示莊居士永覺西方有佛久相招肯信須知路不遙還觀此念從何起歷劫娑婆當下超示達理上人西方有路不難通送想歸西莫戀東念佛常如子憶母何愁子母不相逢念佛偈聞學西方開淨域不染世間情前路無知己君須獨自行勸念佛沈芝塘一心能不亂久久自成功只要工夫熟何愁路不通間斷功難進常修道自成念頭須切實發願在心誠執持名號序執持名號本一心不亂中出非是易事子思之擇善固執顏子之拳拳服膺虞舜之允執厥中皆言執也夫三月不違而後可以言服膺惟精惟一而後可以言允執所以執持名號不同於少福德因緣蓋生西是心上事福德因緣猶有在事上做者故相去懸絶所以觀經云至心念阿彌陀佛一聲滅八十億劫生死重罪古德謂一心既朗積妄頓空喻如千年暗室一燈頓照此理執持之效也然人不可自謂理性未明事持無益雖是事持而持者亦心也大勢至圓通章云不假方便自得心開純一念去自有悟日孔子言困而學之及其知之則一夫孔子説生説學皆落一知字至困學之人不下知字則胸中之不明了可知謂之曰困則學時散亂昏沉無可奈何之狀可以想見然及其知之則同一大圓鏡智矣昔佛世一老人求出家舍利弗等諸大弟子俱不肯度謂彼多劫無善根佛言此人無量劫前為採薪人猛虎逼極大怖上樹稱南無佛以是善根遇我得度獲羅漢果夫散心念佛一句尚永劫不磨況專志持名豈有不往生者哉執持名號第五念佛偈白香山余年七十一不復事吟哦看經費眼力作福畏奔波何以度心眼一聲阿彌陀行也阿彌陀坐也阿彌陀縱饒忙似箭不廢阿彌陀日暮而途遠吾生已蹉跎旦夕清淨心但念阿彌陀達人應笑我多却阿彌陀達又作麼生不達又如何普勸法界衆同念阿彌陀懷淨土北山西望樂雲杳隔一鉤新月灣灣白意欲往生何計䇿彌陀一念聲千百文墨尖新無處用已將名利渾如夢一串數珠隨手弄惟聞念佛心歡勇覽遍經文與律儀頻頻惟勸念阿彌一聲消盡千生業何況嘮嘮久誦持紛紛世態盡空華講外無餘挂齒牙一串數珠新換線阿彌陀佛做冤家菊腦薑芽一飯餘其他安敢費工夫從今十指無間暇且盡平生弄數珠惟將焚誦足平生夜夜嘮嘮一二更隻影自憐塵世外風前月下恣經行善導可嗟今已往化來老少皆歸嚮佛念一聲分一鏹一聲一佛虗空上淨土詩一元西方極樂衆稱尊普勸諸人入此門有口不須間講論單提佛號度朝昏西方弘誓廣流通一句彌陀好用功歷歷分明無間斷聲聲喚醒主人翁西方徑到莫徜徉全要當人自主張但得一心專念佛蓮華國內姓名香西方門路甚分明一句彌陀速趲程早到金剛臺上坐同名同號證無生西方捷徑勝參禪一句彌陀快著鞭十萬億程彈指到為人只欠自心堅西方易往少人知徑路修行不用疑六字真經純熟了金蓮臺上禮阿彌念佛偈古音行住坐臥之中一句彌陀莫斷須信因深果深直教不念自念若能念念不空管取念成一片當念認得念人彌陀與我同現淨土詩中峯一串數珠烏律律百千諸佛影團團循環淨念常相繼放去拈來總一般現成公案絶商量曉磬頻敲蠟炬長晝夜六時聲不斷滿門風遞白蓮香心中有佛將心念念到心空佛亦忘撒手歸來重檢點華開赤白間青黃一心念佛莫蹉跎堪嘆人生去路多急急稱念彌陀佛莫把光陰溺愛河一句彌陀勝坐禪一聲未了一聲連心心念念工夫到在在西方極樂天念佛詩優曇彌陀教我念彌陀我又如何離得他我不識他他是我相逢覿面笑呵呵一句彌陀容易持朝昏記念勿相離念來念去心花綻更是彌陀出世時自性彌陀見也麼問他面目是如何祇知開口茫茫念言下誰知蹉過多自家一箇彌陀佛不假修持已現成莫謂目前全不見一聲喚著一聲應我念彌陀不暫離一阿彌了又阿彌阿彌自喚阿彌問你是阿彌我是誰我念彌陀不在聲高山流水是知音更深人靜月明夜廣舌宣流白藕香聲聲念佛意何長恰似嬌兒喚阿娘直得一聲相應處天真母子喜非常好將金字寄金蓮一句彌陀猛著鞭從頭揚下間家具車𨋀花中占一單懺淨土楚石咫尺金容白玉毫單稱名號豈徒勞晨持萬遍烏輪上夜課千聲兔魄高歲閲炎涼終不倦天真母子會相遭如何説得娑婆苦苦事紛紛等蝟毛間中獨坐面西方手把輪珠念不忘佛號能令心地淨舌根便作藕花香暉暉日到銜山處閃閃金浮滿室光此境此時無別想許君親見鼓音王除夕上堂有出多娑婆三韻蓮池六字真經攝義多總持一似唱也娑自從驀直西方去間殺臺山指路婆示大掉有生必有死長短安足論今得圓僧相平生願已滿當生大歡喜切勿懷憂惱萬緣俱放下但一心念佛注想極樂國上品蓮花生見佛悟無生還來度一切答慈聖皇太后問法尊榮豪貴者繇宿植善因因勝果必隆今成大福聚深達罪福相果中更植因喻如錦上花重重美無盡如是修福已復應慎觀察修福不修慧終非解脫因福慧二俱修世出世第一衆生真慧性皆以雜念昏修慧之要門但一心念佛念極心清淨心淨土亦淨蓮臺最上品於中而受生見佛悟無生究竟成佛道三界無倫匹是名大尊貴淨土詩雪嶠一二三四五六七一心不亂往生西佛言説得雖容易動步通身入淤泥淨土詩失名繫心一句阿彌陀日用間忙任寡多如是盡終不妙悟也教帶業出娑婆念佛偈頂目念無念念古彌陀念到無心壽轉多不動尊王全體現腳跟隨處湧金波念無念念永無遮念到無心始出家任運騰騰隨腳轉去來步步踏蓮華懷淨土沈朗倩四十九年唇口債千七百則葛藤窠老僧怕事都推却間把光陰送曩謨猛把屠刀斫愛窠手中殺活肯饒他洪名六字刀刀血不似風揚驢耳過亂搭伽黎挈領頭持名不是任情搊一聲直去無消息最似蒼鷹始脫鞲念佛偈十千聲佛日為規聽得雞鳴便起持枕上有橋通極樂此身已坐碧蓮池頌執持名號一心不亂妙意昏沉散亂如雲霧萬劫從教今日破大地乾坤通一句聲聲截斷千差路自從夜半安心後直至從頭更不疑兩眼爍開天地濶太平無象到今時淨土偈蕅益西方即是惟心土一串明珠萬行圓掐到斷時頻換線蓮左券更無愆佛會偈已信彌陀大願舟共修三昧度迷流六時行道無餘想一句洪名似救頭應痛盲龜常在溺獨欣孔木只今浮殷勤拶入無生理七寶池邊握手遊示林泡庵永覺佛號綿綿不斷聲恰如猛火鍊真金礦盡金全成大用鑑地輝天別㨾明佛號直如倚天劒截斷千枝與萬枝眼前便是蓮華國那管彌陀願力慈念佛偈彌陀一句無他念萬念俱空見本然便是塵塵成解脫不須更問祖師禪示吳善友念佛一門最為直截不須多知解不用巧言説祇要一句佛崛然如寸鐵管甚恩與愛管甚怨與結諸念俱不生娑婆影自滅念佛偈聞學子母不相離淨念常相繼良哉大勢至得此無盡意懷淨土詩蓮隱一句彌陀火裏蓮五種諸教莫能詮聲聲不斷魔難近念念無差佛現前多劫沉迷根盡拔一生精進果堪圓含靈抱識皆同體但辦肯心誰不然凡夫羸劣觀難成但事持名即往生到底若能心不異臨終自有佛來迎世緣易染刀頭蜜道念難堅水上萍樂國風光殊不惡歸歟早賦徹宵征勸念佛沈芝塘人生都是假萬事總成空要到西天去全憑六字中莫道年華好光陰迅速過認明方便路惟有念彌陀聖境現前序諸佛如來入一切衆生心想中如白日升天影現百川然假使川中水濁日雖在天亦無由見故必以觀門念佛方能澄清濁水心眼開發廣見依報無常經有云人將命終身心痛苦應令病人觀佛相好心心相續使發菩提之心復為廣説三界難居三途苦難唯佛菩提是真歸依嗚呼此如來悲憫衆生拔濟於臨命終時之苦心也佛言垂終之心其力甚大故臨終之念能消重業然豫見平生念佛人至臨命終時容有痛苦逼身舌根短硬不能念佛者有之何況平時觀想不熟至八苦交煎四山相逼之時欲其隨知識之口念佛聲聲不絶作觀心不散亂此必夙世因中善根深遠乃能得之豈可望于悠悠之衆生哉必如觀經云惟除睡時恆憶此事又云出定入定恆聞妙法方是穩著聖境現前第六淨土詩阿氏多自然音樂樂無涯七寶樓臺麗日霞上妙衆香常不散繽紛雲裏雨天花九品蓮花偈呂純陽挺挺出金池瓣瓣含玉露火裏放奇香色比菩提固心即臺之象蓮因色是身西方無個處極樂悟虗真雙行樹裏泥團九品蓮中甘露頻伽不解無生飛向恆河深處昨夜天風吹北斗驪龍獅子一齊吼要見蓮花何處尋蓮花却在如來口菩提無樹鏡無臺安得蓮花九品開分付通源休浪悟客塵二字證如來道人慣會饒舌要講蓮花顏色不長娑婆四部中不染青黃赤白黑時時入觀見如來柳花搖動瓔珞月往生偈惟岸觀音助遠接勢至輔遙迎寶瓶冠上顯化佛頂前明俱遊十方剎持華候九生願以慈悲手提獎共西行淨土詠李青蓮向西日入處遙瞻大悲顏目淨四海水身光紫金山勤念必往生是故稱極樂珠網珍寶樹天花散香閣圖畫了在眼願托彼道場以此功德海冥祐為津梁八十億劫罪如風掃輕霜庶觀無量壽長覩玉毫光臨終生西偈延壽彌陀口口稱白毫念念想持此不退心決定生安養西歸軒蘿月君言樂國是吾家自笑飄零客路賖一點歸心懸落日百年幻事寄空華臍輪不鼓經簾卷鼻觀常清篆縷斜正念相成無外物小窗行樹緑交加懷西方北山西指西瞿更向西向西西去有招提華開菡萏光無夜地布琉璃瑩絶泥風動法音強八詠池流德水勝雙溪臨終但得超生去九品從教低處低從是西方十萬億山長水遠誰人識唯有觀門歸路直坐澄劫水琉璃碧兀坐初修水觀成微風不動翠波平幽深境界誰人見一片琉璃照眼明為厭娑婆求淨土馳情送想存朝暮誰信不勞移一步樓臺隱隱雲深處誰知端坐却能遊頃刻心飛到玉樓竹影月移來戶牖更疑行樹在簷頭九品蓮華次第排也應荷葉翠相挨未知何日生蓮界無奈朝昏甚挂懷西方詠一元西方淨土果奇哉優鉢羅華遍界開種種現成真富貴一華臺上一如來西方在近路無多直下承當在剎那觸目遇緣皆極樂水流風動演摩訶西方大地是黃金寶樹參天演法音如此名為安樂國三塗八難永無侵懷淨土中峯勢至曾參日月光教令存想念西方自從親證三摩地不離慈尊左右旁觀經一卷是家書日落之方有故居多辦資糧期蚤到免教慈父日嗟吁濁水盡清珠有力亂心不動佛無機眼前盡是家鄉路不用逢人覔指歸大圓鏡裏絶塵埃碧藕花中有聖胎遙望金沙池沼外寶光常照玉樓臺淨土讚極樂世界淨琉璃寶樹行行列四維金沙布地銀階道璧玉闌干繞七圍淨土詩楚石儒者之詩云伐柯伐柯其則不遠説者曰執柯以伐柯睨而視之猶以為遠信斯言也吾宗念佛惟我自心心欲見佛佛從心現阿彌陀佛三十二相八十種好性本具足不假外求神通光明極未來際名無量壽至於華池寶座瓊樓玉宇一一淨境皆自我心發之妙喜有云若見自性之彌陀即了惟心之淨土如楞嚴會上佛敕阿難一切浮塵諸幻化相當處出生隨處滅盡因緣和合虗妄有生因緣別離虗妄名滅殊不知生滅去來本如來藏常住妙明性真常中求於去來迷悟生死了無所得既無所得但是一心若淨土緣生穢土緣滅則娑婆印壞壞亦幻也若穢土行絶淨土行興則極樂文成成亦幻也然此生滅淨穢不離自心心不見心無相可得雖終日取捨未嘗取捨終日想念未嘗想念在彼不妨幻證在此不妨幻修一發心時已成正覺何礙幻除結習幻坐道場幻化有情幻臻極果豈不了世出世間之幻法調御丈夫之事乎昔天衣懷禪師親見明覺盡佛祖不傳之妙嘗修淨土垂問學者曰若言捨穢取淨厭此欣彼則是捨取之情衆生妄想若言無淨土又違佛語修淨土者當云何修乃自答云生則決定生去則實不去無過此語也有心者悉當念佛前所謂惟心淨土自性彌陀不出戶庭夫何遠之有要觀無量壽慈容只在如今心想中坐斷死生來去路包含地水火風空頂分肉髻光千道座壓蓮華錦一叢處處登臨寶樓閣真珠璀璨玉玲瓏放下身心佛現前尋常盈耳法音宣風柯但奏無生曲日觀長開不夜天行趂玉階雲冉冉坐依珠樹月娟娟凡夫到此皆成聖不歷僧祇大果圓未歸極樂尚閻浮漂泊風塵更幾秋殘夢頻驚蕉葉雨故鄉只在藕華洲屈伸臂頃無多地高占人羣最上頭二大士心憐老病何妨擕手入瓊樓法王治化寶蓮宮菩薩聲聞滿國中普覆猶如天在上大明勝似日生東青螺髻接浮雲嶺白玉毫輝跨海虹世出世間無比者當知體性本來空天人莫不證神通一一黃金色相同散衆妙華為佛事盡塵沙界起香風身光觸體成柔軟樂具流音説苦空却倚雕欄看寶樹無邊佛國在其中幾回夢到法王家來去分明路不差出水珠幢如日月排空寶蓋似雲霞鴛鴦對浴金池水鸚鵡雙銜玉樹花睡美不知誰喚醒一爐香散夕陽斜蓮臺得坐最高層我許凡夫願力能頃刻人心翻作佛斯須水觀化為氷玉抽瑪瑙階前樹金匝琉璃地上繩無限天華滿衣裓十方佛國任飛騰衣不傷蠶食不耕水邊林下好經行身心快樂無諸苦依正莊嚴在一生念念佛光從口發時時天樂遍空鳴却嫌鞋襪霑泥滓千葉蓮華向足擎多言極樂向西尋究竟不離清淨心空影入池皆碧玉日光穿樹盡黃金事如夢幻雖非實理到圓常却甚深八萬四千真相好請君危坐扣靈襟家在西頭白玉京老來難遣故鄉情每瞻雲際初三月先注華間第一名密密疏疏琪樹影來來往往水禽聲紅樓紫殿春長好縱有丹青畫不成吾身念佛又修禪自喜方袍頂相圓曾向多生修福果始依九品結香緣名書某甲深華裏夢在長庚落月邊濁惡凡夫清淨佛雙珠黑白共絲穿無邊大士與聲聞海衆何妨逐品分一會聖賢長在定十方來去總乘雲談玄樹上摩尼水念佛林間共命羣坐臥經行無礙天華隨處落繽紛西望紅霞白日輪仰觀寶座紫金身一方土淨方方淨當念心真念念真生極樂城終不退盡虗空界了無塵向來苦海浮還沒何幸今為彼岸人淨土詩古溪彼無惡道絶聞名羣籟都為念佛聲細溜通渠調錦瑟微風吹樹奏瑤笙鶴從翡翠簾前下人在琉璃地上行行者悠然心不亂琅琅天樂自來迎修途十萬一毫端何謂西方路渺漫佛境不從心外見真容多在定中觀寶華叢裏巢鸚鵡玉樹枝頭宿鳳鸞清泰故家迎海衆風雲際會一聲歡淨土詩博山淨心即是西方土錦繡乾坤淨業成一句彌陀才吐出昂藏皮袋廓然清淨心即是西方土一句彌陀一佛成大地都來銀世界更於何處覩明星淨心即是西方土口説無憑步最親爛壞木魚輕擊著幾多花雨亂濵紛淨土詩沈朗倩珍羅垂網引香臺口滑迦陵幾喚回林下笑逢金色侶共擕花裓候如來詠日觀妙意一輪明鏡劫塵封咫尺彌陀路不通萬法惟心初約日從知大覺即心翁詠水觀氷結琉璃俄然成水忽成氷氷結琉璃寶池成妙性圓明無住相隨渠建立自心生寶幢光明七寶金幢百寶成寶珠八面寶光擎一光八萬四千色億日輝𤾗映眼明華幢演法華幢臺邊樂器盈清風八種自然生樂音風鼓傳空諦趺坐琉璃傾耳聽詠八功德池水觀八功德池純一珠玉所成成池水者寶也而成寶者珠也蓮華生於池中而水之流於華間演説妙法者亦珠之所為也金色光化為寶鳥讚嘆三寶而涌出金光者亦珠之所為也池開寶蓮珠成七寶寶成池池作金渠十四支蓮華詎止車輪大觀佛成時某在斯水流説法珠水涓涓繞勝蓮回環上下法輪圓苦空無我聲聲出又寫如來相好篇鳥聲説法珠光化鳥鳥和鳴鳥語嚶嚶佛法僧功德水中無盡藏相看總是性珠明詠樓閣總觀琉璃寶池黃金界樓閣空中天樂清音中共奏無生曲觀聽明時定往生水觀別詠碧波深處釣魚翁拋餌牽絲力已窮一棹清風明月下不知身在水晶宮鳥鳴説法別詠拂拂山香滿路飛百花俯仰鬪芳奇春風無限深深意未審黃鶯説向誰樹説法別詠貝葉收不盡一句無私萬法印千聖滿口不能宣嶺梅漏泄春光信總詠也大奇也大奇無情説法不思議若將耳聽終難會眼處聞聲方得知頌起自心生於西方極樂世界於蓮華中結跏趺坐茫茫不識火中蓮滿面塵埃又幾年簸土揚沙無避處翻身直到御樓前堯舜垂衣萬國賓撥雲見日意休陳東方來者東方坐遍界通霑雨露新淨土偈永覺琉璃寶池黃金相不在西方不在東妄想盡消歸一佛自然身坐藕花中念佛偈聞學飛鳥弄圓音水有八功德歷歷顯清機皆因淨心得懷淨土詩蓮隱淨遠近沒途程只貴專心持佛名一念斷時忘計較六門隨處放光明寶池菡萏花爭吐珍樹頻伽鳥共鳴來往娑婆知幾遍者回始不負生平發明心地序觀無量壽經云上品中生者不必受持讀誦方等經典善解義趣於第一義心不驚動深信因果不謗大乘妙宗云是義持人不樂讀誦但於經中取一句偈深窮旨趣於絶言思深廣之理心不驚動又復其心安住中道不為二邊之所驚動了達因果皆是實相名為深信雖不遍習或聞大教赴機異説知顯一理不生疑謗此即宗門所謂參無意味語發明心地者也因其行大乘解第一義以故千佛授手純説甚深第一義諦然七日得不退轉修小劫得無生忍若夫上品上生者一往即悟無生法忍須臾即遍十方歷事諸佛而究其往生之因則具戒行讀誦大乘修行六念之人可見如來重戒重學與重悟之意似不欲偏廢者也至龍樹菩薩如來謂其於世間中顯我無上大乘法非悟明心地乎曰得初歡喜地非八地菩薩乎而繼之曰往生安樂國此又與上品三生皆以大心回向往生之左券若合符節者也故雲棲云普賢為華嚴長子雖塵塵華藏在在蓮而行願品必拳拳乎以往生安樂為言已悟尚然無語可知至言悟自己佛不必求生此為十地菩薩以上説若云悟第一義結使未斷者皆不求生則自誤誤人古德言之詳矣發明心地第七念佛頌慈受樹林水鳥各宣揚寶網金臺盡道場會得鍾鳴并鼓響彌陀觸處放毫光西方詠一元西方不用學多端一句彌陀在反觀見得本來真面目始知生死即泥洹西方佛號我同名直下承當了不驚若得一聲親喚醒何勞十萬億途程西方公案早行持寂寂惺惺著意疑疑到情忘心絶處元來自己是阿彌西方一句是單傳不假修持已現前諸上善人如見性阿彌陀佛便同肩西方衆苦不能侵先要當人了自心會得目前真極樂拈來赤土是黃金西方一路向前行圓發三心諦理明上品上生彈指到最初見佛悟無生念佛心要頌草庵釋迦如來説阿彌陀佛是法界身天台智者又言實相為體憑茲二説以為心要則十萬億剎若臨明鏡矣無邊剎海海涵空海空全是蓮華宮蓮宮周遍遍空海空海獨露彌陀容阿彌陀佛不生滅難覔難拈水中月絶非離句如是身如是感通如是説我與彌陀本不異背覺潛生忽成異從今掃盡空有塵父子天然兩相值誓修三福勤六念身口意業無瑕玷我今以此念彌陀不見彌陀終不厭懷淨土中峯揑目橫生空裏花妄將三界認為家大千常寂光明土不隔纖塵總是遮愛繩牽入苦娑婆哭到黃泉淚轉多誰謂別離窮劫恨通身渾是古彌陀迷時無悟悟無迷究竟迷時即悟時迷悟兩頭俱拽脫鑊湯原是藕花池四十八願水投水千百萬億空合空法藏慈尊無面目不須重覔紫金容正念阿彌陀佛時寶池樹影日遲遲更馳心欲歸清泰又是重栽眼上眉萬劫死生如重病一聲佛號是良醫到頭藥病俱忘却不用重宣母憶兒一句彌陀作話頭單提不用別參求工夫徹透泥團破鐵佛通身也汗流世界何緣稱極樂只因衆苦不能侵道人若要尋歸路但向塵中了自心生滅無生生不生樂那肯禁人行誰知萬丈紅塵裏菡萏花開月一更此心空寂念何依故國云歸孰未歸花外玉雞啼曉日遠迎新佛奉慈悲成住壞空真淨土見聞知覺古彌陀但於當處忘生滅父子相牽出愛河禪外不曾談淨土須知淨土外無禪兩重公案都拈却熊耳峯開五葉蓮大夢宅中無一法於無法處有千差回觀自性離分別念念純開白藕華暗室中藏大黑蚖未曾驅盡莫貪眠髑髏壓碎須彌枕匝地香風綻白蓮故鄉易到路無差白日青天被物遮剔起兩莖眉自看火坑都是白蓮華十萬餘程不隔塵休將迷悟自疏親剎那念盡恆沙佛共是蓮華國裏人念佛只須圖作佛不圖作佛念何為但當抱識含靈者白藕均同有一枝示入泥洹記仲春風前歌舞恨波旬誰知自性黃金佛常共千華轉法輪寒食荒郊盡哭天有誰遙念老金仙劫初埋向蓮華土不要人來化紙錢初夏清和四月時九龍噴水沐嬰兒樂化主無生滅只把黃金鑄面皮清泰故鄉無六月從教火傘自張空金沙地上經行處陳陳吹來白藕風誰知九月東籬菊便是西方四色花一個髑髏乾得盡百千聞見自無差念根是一串輪珠痛䇿歸鞭莫遠圖念到念空和念脫不知身在白芙蕖藕絲縛住金烏足業火燒開車𨋀花更有一般難信法腳尖踢出佛如麻才要歸家即到家何須特地起咨嗟門前大路如弦直擬涉思惟路便差一鉤蘿月照松龕門外無人宿草庵萬億紫金身化主不離當念是同參自性彌陀絶證修只消扣己便相投瞥於當念存能所又被空華翳兩眸長鯨一吸四溟乾自性彌陀眼界寬眉裏玉毫遮不得珊瑚枝上月團團蓮華國土無金鎖聞見堆中有鐵圍透得目前聲與色百千賢聖合同歸活計惟撑一隻船流中坎止只説緣古帆幾度張明月滿目純開佛海蓮船居念佛佛隨船常寂光搖水底天兩岸中流如不觸枝枝紅藕發心田破曉移船直過東滿帆披拂藕華風一尊自性彌陀佛出現扶桑照眼紅念心如影每隨形靜閙間忙不暫停打破形軀和影滅西天此土絶途程彌陀西住祖西來念佛參禪共體裁積劫疑團如打破心花同是一般開講座平分性相宗相成相破不相同朅來講到華池上菡萏何曾兩樣紅船住東西南北了依然不離古灘頭等間撥轉虗空舵香氣滿船花滿洲打破虗空笑滿腮玲瓏寶藏豁然開要明空劫生前事一一承當見出來念佛詩優曇一句彌陀無妄想聲聲流出自心來便從這裏破去鐵樹無根花自開一句彌陀息萬機碧潭風靜湛如如夜深月向波心現湧出銀盤一顆珠一句彌陀吼怒雷十方剎海眼晴開法王法令親提起凡也皈依聖也來一句彌陀上上機氣虗神朗洞玄微全身拶入常光界實實無言説向誰一句彌陀正信深曇花早現一枝春分明好箇到家句自性西方舊主人一句彌陀心自明信知一步不虗行腳頭腳底彌陀現萬朵蓮華足下生一句彌陀便是經受持須要自惺惺百千萬億龍宮藏只在當人一念成一念心開薦得渠看時似有覔還無雖然伎倆不多子展放威光塞太虗自家一箇彌陀佛舉念之時不見他認得依然成兩箇與君説破笑呵呵真常寂處絶思量般若開華正覺場箇裏恆沙諸佛住一枝優鉢火中香寂照光中顯大機彌陀覿面露金軀通身手是通身眼夜半三更木鳥啼寂照雙亡也大奇照天照地不思議石人撫掌呵呵笑箇段風光説向誰禪非智照難窮寂智若無禪照不深禪智圓通無礙碧天朗月徹清風我念彌陀幾許年常思撇了別參禪自從覿面相逢後始信長空便是天我念彌陀會得禪聲聲流出未生前木人撫掌呵呵笑獨角泥牛海底眠我念彌陀震法雷勞生夢眼一時開千年老藕新華綻無限香風動九垓我念彌陀徹十方十方惟我法中王目前穢淨俱無礙丘圾堆頭也放光我念彌陀著相多衆生都喚作彌陀雖然他未承當得且得彌陀授記他我念彌陀信有緣尋幽直到虎溪邊孤峯頂上開雙目徹見心華滿大千我念彌陀得趣多眼前都不問如何間拖拄杖登山望萬疊峯巒積翠螺一念心平法界平大千沙界絶丘坑腳頭腳底皆方便大道堂堂任意行一卷真經不外求無邊妙義眼睛頭未曾舉起先知得一剎那間一藏周一卷真經妙義深幾多人念少知音聲聲突出金剛眼覷破從前古佛心一卷真經念出新不知念者是何人若非格外明宗旨爭識衣中無價珍佛是有聲禪禪是無聲佛有聲與無聲畢竟是何物金剛正眼頂門開白蓮香散塵沙國念佛參禪共體裁彌陀西住祖西來但能打得疑團破紅藕花無兩樣開諸佛衆生同這箇四生六道阿誰無頂天立地知多少試問誰人識得渠信心念佛到西方性地蓮開世界香塞破虗空全是我不須洗面著衣裳懷淨土詩楚石有箇彌陀在自心才生一念隔千岑于中豈得回光照直下翻為向外尋緑水青山皆妙體黃鶯紫燕總玄音凡夫只為貪瞋重不覺身棲寶樹林無常無我法全該水鳥風林豈異哉不動一塵常在定遍遊諸剎又歸來凡夫本自同彌勒知識何嘗離善財堪忍便為清淨界覺華還向妄心開山雲靄靄水泠泠共説西方一卷經石虎却來巖下嘯泥人在往樹間聽風飄陽焰隨波散雨浥空華逐蒂零極樂此時堪駐足彌陀何處不流形粗境前前猶未識法身向上幾曾知可憐轉腦回頭處錯認拈香擇火時口耳相傳六箇字聖凡不隔一條絲堂堂日用天真佛火急回光也是遲幽居悄悄柏森森不遣紅塵染素襟一佛號收無量佛後心功在最初心雲開白月毫光滿雨過青山髻色深當念休生差別解風聲鶴唳盡玄音若非念佛便參禪參得禪時佛現前萬丈碧潭從此淨一輪秋月向空懸直教表裏光明透盡見高低物象全只箇法王無去住方知不落斷常邊勸禪者參禪只是自明心作佛何須向外尋動靜去來真極樂見聞知覺古觀音高懸慧日三千界普現慈光百萬尋把本修行須念佛神仙也要用功深示某念佛偈達觀五十八歲前汝果年多少於此痛觀之多少年便了了得好念佛未了念佛早生死從身有離身何處討生日偈自知今日出娘胎今日如何娘不來來去覔娘無所得蓮華國裏一枝開淨土詩雪嶠珊瑚枝挂弱犀牛苦海揚波難盡頭咬碎一團空界月與君把手入層樓淨土詩博山淨心即是西方土倒跨崑崙入海門行到水窮山盡處灼然別是一乾坤淨心即是西方土官不容針車馬通古木鴉聲才歇得一輪明月出煙籠淨心即是西方土木馬嘶風過漢秦踏破髑髏誰是主多年故舊一時新淨心即是西方土無相光中有相身心境牽纏成鬼戲誰為我也孰為人淨心即是西方土露柱燈籠笑未休喫盡世間酸苦味蒲團剩有暗香浮淨心即是西方土教外須知別路行若是祖師門下客破顏端不論無生淨心即是西方土皮袋還知痛癢無掉轉乾坤何境界夜明簾外夜明珠淨心即是西方土相見揚眉落二三古道不存車馬迹舌頭無骨定司南淨心即是西方土魔界空時佛界空世界間雲收拾盡一輪迸出海天紅淨心即是西方土逐隊隨羣粥飯僧一飽飢瘡無別事殷勤祇奉佛前燈淨心即是西方土古寺清幽月到窗夜半捉來床畔鼠天明飛出繡鴛鴦淨土詩專愚遙想西方大導師夜來月吐瑚枝玉京吹徹無生曲正是蓮開上品時雲有深山鶴有林惟豫安養是歸心夜來月照長廊下一句彌陀劫外音秋山無伴獨幽尋古殿寒巖步步深一句彌陀傳遠谷空林頑石似知音呼浪呼波都是水分禪分土豈殊途不知佛法無多子空逐名言墮有無跏趺夜半一聲鍾敲破西方不見蹤方識彌陀原是我開簾月照萬層峯有時獨上孤峯頂遙望西方是我家幾朵白雲出遠岫一行疏鴈過天涯觀世音圓通頌為尋紫竹林中主誤入圓通不等間幾片白雲飲緑水一輪紅日吐青山雨裏榴花新浴出雲中鳥語帶潮來獨憐消息無人識幾度披簑移竹栽蘆葦冥冥秋水陰行人無伴轉蕭森試看念念驚懷處便是尋聲觀世音背上癰花堪擬鉢面前目癤可如桃但思就裏誰知痛莫問圓通白玉毫死死生生生復死來來去去去還來普門隊裏無來去生死叢中見善財春鶯啼遍柳煙城秋鴈鳴時蘆白聲百鳥百聲聽不盡何須更問海潮音手觸手時各有知箇中消息莫狐疑大悲八萬四千臂試看何人少一支刺蝟針錐能覆體蝸牛宮殿自隨身青階白壁皆安樂花雨香風都是春螢火腹間燈燭火飛蚊翼上管絃長隨身樂事堪行樂不必逢人問故鄉四蹄踏地何其妙兩角撑天亦灑然出沒自由無挂礙倒騎驢子上雲巔枝頭羽族結臺殿地裏羣毛作洞房莫謂幽居有上下長天虗谷一秋光蟻穴玲瓏若鬼工層層疊疊密相通微塵身入微塵土識取光明藏一同淨土詩晦夫紅輪決定沈西去未審魂靈在那方盤山悟處非他物孝子原來是大郎月印蓮池池印空風鳴竹樹樹鳴風世間多少奇男子錯認彌陀在別峯淨土詩萍蹤源頭歷歷記分明靜裏休教雜念生劃斷去來生死路故鄉田地不須爭淨土偈沈朗倩人情末法險波瀾莫把彌陀白眼看念到驀頭親撞著含元殿裏話長安頌諸佛如來是法界身入一切衆生心想中妙意乾坤盡是黃金國萬有全影淨妙身玉女背風無向背靈苗化秀不知春頌心想佛時是心即是三十二相八十隨形好四維上下絶遮攔湧出氷壺即碧天無孔𥴦中藏六律一聲欵乃過前川劫外相逢那畔行靈苗叢裏鐵牛耕東風吹散千巖雪空臥無雲孤月明頌是心是佛平實商量見題目和盤傾出不寒酸只今夜夜明星見露出胸襟仔細看佛與衆生原不異特言成佛誘迷津止啼黃葉渾無奈夢覺初回識故人幾片白雲橫谷口簾前花雨不知春拈匙把箸如明了掃地焚香不倩人頌諸佛正遍知海從心想生鶴巢露滴夢初回新月半鉤升萬戶一片白雲何處起白雲兒倚青山父纖雲不露煙波濶白鳥去盡青天還踏破草鞋跟子斷巍然同坐大雄山頌見眉間白毫相者八萬四千相好自然當現一毫端內通消息遍界明明不覆藏靜極爍開頂上眼塵勞門內盡金光自家透脫自家知八萬光明更問誰全體承當全體見須彌頂上戴須彌頌上品中生不必受持讀誦方等經典善解義趣於第一義心不驚動佛菩薩接引紫金臺如大寶華普聞衆聲純説第一義諦不向經題識本真紙堆討甚法王身未開梵夾承當去免作循行數墨人癡兒刻意止啼錢良駟追風顧影鞭雲掃長空巢月鶴寒清入骨不成眠向來面壁成何事爭得心開見本源空劫以來諸佛子話頭不舉自然圓淨土偈蕅益博山禪師拈淨土偈每云淨心即是西方土蓋欲以因攝果也而讀者不達遂至以理奪事豫觸耳感懷更拈西方即是惟心土俾以事扶理而理不墮偏空非敢駕軼先達聊附于補偏救弊之職云爾西方即是惟心土離土談心實倒顛念念總皆歸佛海何須重覔祖師禪西方即是惟心土理事相應始有功日用未能違現行如何妄欲擬真宗西方即是惟心土土淨心空病亦忘良藥不勞從外覔阿伽一味有餘香示修淨業永覺綿綿密密勤持念生滅何曾成一片念到生滅不相干腳底蓮花恆出現他佛分明皆自佛念他還同念自時有朝念寂忘他自極樂收歸東院西休道西方無極樂只因這裏有娑婆打破娑婆成粉去西方不隔一塵多五濁娑婆本自空只緣迷執自牢籠空花實實無生滅燦爛全因翳眼中念佛偈念佛人要純一出息還須顧入息淨心相繼障雲開摩著生前自家鼻念佛人要心勤懈怠從來長妄情憤然一念常如此寶蓮日日放光明念佛人要志堅滴水須知石也穿念頭迸出燎天燧管甚西方五色蓮念佛人要端正端正方能成正信菩提種子自培成便是彌陀親法胤示淨土社諸友一念彌陀渾似鐵間忙動靜離生滅此土西方成粉去説甚無生湯裏雪崛然一句若金剛百煉千鎚未肯忘直透威音那畔去不離方寸即西方劒輪揮處夜光寒山色溪聲未可瞞直待金雞親唱曉五色蓮華映寶欄持名不用更求玄一句頓超聲色光萬境融成一片月何分東土與西天癡狂外逐何時足山積黃金也積愁若肯盡情都放下長空雲淨月輪秋總攝六根惟念佛浮情煉盡自圓成巍巍臺上黃金相不須起念自分明莫向境緣生好醜凝成一念竟無分忽然打破琉璃鏡説法音聲許獨聞淨土偈人人自有古彌陀十二時中莫放過但得心光長不昧不勞彈指出娑婆示念佛衆善友百癡一聲提起一聲親提起聲聲現本人霧散雲收秋月朗海天空濶白如銀彌陀與汝甚冤讎口角垂涎罵不休驀地豁然開正眼方知步步踏蓮舟念佛偈聞學君有淨土心悟心方知土界道有金繩六時休錯路念佛念自心念體元空寂當念了無依心心無別佛懷淨土詩蓮隱乾坤總是我茅庵日月常懸燈一龕融盡千差無異趣會教萬象作同參穢由業應離棄淨土惟心好荷擔四字彌陀窮徹底劫前花放古優曇淨土詩鳳翔禪悅須遲閙處尋分明無始到於今早知有相皆虗妄山不高兮水不深流出源頭水不清問君何處覔無生浮雲原在青天外只為盲人看不明重船載寶駕長風西去休教錯向東最苦此中成斷滅鐵鞋穿破亦無功萬法都歸不二門昨宵今晚又黃昏要將般若成觀照方信神通仗六根勸念佛沈芝塘幼修誰説早老念未為遲一念回頭處分明夢醒時淨土偈賀壽昌往西覲佛有何愁一句彌陀到盡頭智慧頓開生死了蓮得路碧蓮樓華開見佛序佛相八萬四千相中之好亦八萬四千好中之光亦八萬四千皆云八萬四千者蓋佛居凡地具於八萬四千塵勞於此塵勞皆見實相理智既合故能示見相好光明皆八萬四千也行人若知心即是佛能於塵勞皆見實相經云佛觀一切衆生煩惱心中有如來身結跏趺坐儼然不動德相具足天台云諸佛法身與己同體觀佛時心中現者即是諸佛法身之體所謂是心是佛也佛由觀而生所謂是心作佛也行者應以是佛作佛義一念圓照由觀見佛觀之既熟經云無量壽佛觀音勢至常來至此行人之所妙宗云當念即是來際故能預想將來之事復由佛與衆生體不別故故令三聖不來而來如此則臨命終時華開見佛亦是尋常慣事矣又王龍舒云有人疑此間人念佛如何西方七寶池中便生蓮華一朵答云大明鏡中物來自現阿彌陀佛國中清淨明潔豈不照見十方世界又有疑十方世界人念佛臨終之際佛與菩薩烏能知而來迎答云天上一日普照天下況佛威神乎華嚴經云若能念佛心不動則常覩見無量佛若常覩見無量佛則見如來體常住夫衆生念佛能見如來豈有如來不能見衆生乎衆生惡業能見地獄豈有淨念不見如來乎華開見佛第八淨土詠龐道玄十方同一等此是真如寺裏有無量壽本來無名字凡夫不入理心緣世上事乞錢買瓦木蓋他虗空地却被六賊驅背却真如智終日受艱辛妄想圖名利如此學道人纍劫終不至四性同一舍三身同一室一切惡知識總見彌陀佛説事滿天下入理實無多常被有為縛何日見彌陀一念心清淨處處蓮華開一華一淨土一土一如來臨終生淨土詩仙潭本自無家可得歸雲邊有路許誰知溪光遙落西山月正是仙潭夢斷時臨終半月前偈空裏千華羅網夢中七寶蓮池踏得西歸路穩更無一點狐疑勸衆念佛慈受萬人同志念彌陀衆力相成願力多一朵蓮花親見佛方知淨土勝娑婆生淨土偈一行吾年九十頭雪白世間應無百年客一行道人歸去來金臺坐斷乾坤窄懷淨土北山滉漾空中仙樂動笙簫聲細天風送接引凡夫歸聖衆男兒此日方崇重西土文成東印壞星飛一點千華界勿訝神魂生去快樂只在同居內八德池深華又大跏趺端坐蓮華載耳聽法音心悟解從今跳出胞胎外十八大賢居會下功成五色雲西駕諸上善人都在那聚頭只説無生話池邊行樹不全裊裊金橋露半斜忽見化生新佛子紅蓮開處噪頻伽西方詠一元西方池內寶蓮開寶物莊嚴自化來百寶光中親見佛巍巍端坐寶華臺西方淨土有蓮胎普勸衆生歸去來一念華開親見佛永無八難及三災懷淨土中峯八功德水映金沙百寶樓臺散曉霞更有一般奇特事開敷紅藕大如車任運移船過水南不須向外覔同參自家屋裏彌陀佛念念開敷優鉢曇彌陀頌彌陀大教振西方救度衆生妙莫量九品蓮開垂接引七重琪樹列芬芳巍巍金相端嚴好皎皎銀臺燦爛光大覺樓前勤懇禮頓明本性悟真常淨土詩博山淨心即是西方土親到方能辨祖宗吸盡澄江高著眼鏡清水底日頭紅淨心即是西方土肉髻明珠不用親萬人程途彈指到莫教孤負好時辰淨心即是西方土狹路逢人話短長兩耳聾時聽愈好鄉音誰與辨宮商頌是心作佛妙意水入水時無別味空投空處沒參差漚花影裏千尋浪即是蓮華般若池斷絶千崖路未窮誰知鐵壁自能通渾身是病渾身藥夢跨青鸞入絳宮山長水遠空相憶黃葉風吹夢裏疑直見爺娘親面目相逢豈是螟蛉兒犂牛耕出古黃金照地光天山嶽寒文叔雖為天子貴子陵元作故人看頌上品上生具諸戒行讀誦大乘修行六念回向往生阿彌陀佛放大光明與諸菩薩授手迎接彈指往生即悟無生十方諸佛授記得陀羅尼門精金百鍊現全功解行相應佛佛同怪道十方俱歷事不勞彈指看飛龍示鄭用弼永覺心淨土自淨此理萬難移淨心無別法一佛破羣疑藕絲如未斷能牽大象馳直教片念息方名見佛時勸念佛沈芝塘臨去西方路明明在目前華開能見佛此處要心堅廣度衆生序阿彌陀佛為比丘時發四十八願已乃託生一切衆生中同其形體通其語言以設教化故上自天帝下至微細蟲蟻皆託生其中設化無量劫是阿彌陀佛成佛之因一度生而已釋迦佛為善慧仙人時以五百銀錢雇瞿夷五莖華供然燈佛瞿夷問以華供佛欲何所為答言為欲成就一切種智度脫衆生是釋迦佛發願之始一度生而已華嚴經載普賢菩薩勸進善財童子有云虗空界盡衆生界盡衆生業盡衆生煩惱盡我願乃盡而虗空界乃至衆生業煩惱不可盡故我願王無有窮盡念念相續無有間斷身語意業無有疲厭至臨命終時最後剎那一切諸根等悉皆散壞惟此願王不相捨離願王導引往生極樂世界見阿彌陀佛生蓮華中蒙佛授記於煩惱大苦海中拔濟衆生令皆得往生極樂世界是華嚴經大願一拔濟衆生皆往生極樂世界而已華嚴經回向品云我當於彼地獄畜生閻羅王等險難之處以身為質救贖一切惡道衆生令得解脫此煩惱大苦海中拔濟衆生之事也則是求成佛與求生淨土總是為度衆生故故未生淨土者雖度生之舟楫未具不能隨諸衆生出入生死而以彌陀之舟楫為舟楫亦可行度人之事彌陀願云十方衆生稱我名號必生我國地獄餓鬼亦生我剎雲棲云念佛一門普逗六道衆生之機佛以無緣慈攝衆生者入衆生性為內熏成現身説法為外熏則勸人念佛即見如來外熏之義華嚴經云即以利益諸衆生而為自行清淨業廣度衆生第九頌念阿彌陀佛結十萬緣會文潞公知君膽氣大如天願結西方十萬緣不為一身求活計大家齊上渡頭船西方詠一元西方彈指悟無生上品金臺佛早成面見彌陀親授記當來説法度羣情西方不擇富和貧不揀賢愚貴賤人不問女男并老幼不分僧俗與冤親西方功德水無痕念佛先須達本根非但人倫生淨土蜎飛蠕動也沾恩讚喻彌陀偈丁注淨師捨妻孥為如來徒募萬人結淨土會鄉人丁注以偈讚之心淨佛土淨法王非妄言拔身出塵垢已現火中蓮一念不起滅極樂即現前大千同此境豈止萬人緣懷淨土中峯四生六道滿河沙只為當初一念差返照回光來受度超生淨土托蓮花一句彌陀自主張別無一法可思量明明直指歸家路四衆同登大覺場普勸念佛優曇念佛門深入者知窮玄極寂妙難思藕絲竅裏開珍藏濟物利生無盡期念佛門如大渡船渡人渾不擇賢愚若知這畔風波險便好登舟過那邊道人來到道人家一炷清香一盞茶不説世間塵俗事聲聲只讚白蓮華一卷真經念了時無邊功德不思議天龍八部皆回向大地含靈得路歸一切衆生無殺業十方何處起刀砧家家戶戶皆修善勸念彌陀報四恩一藏靈文不覆藏星輝月朗顯堂堂目前不昧親提起普請知音共讚揚一句彌陀開化門豈拘城市與鄉村直饒邪見人聞得也落音聲入耳根一句彌陀多善根蜎飛蠕動也沾恩三塗地獄才聞得捨苦皆歸解脫門懷淨土楚石讚佛言詞貴直陳攢花簇錦枉尖新自然潤澤盈身器無數光明湧舌輪稱性莊嚴依報土隨機勸發信心人願求功德池中水盡滌娑婆界上塵勸琴者由來學道似彈琴清濁高低自在心聲太促時絃又斷指才停處韻還沈一塵不到山當戶萬籟俱消月滿林拋却絲桐勤念佛子期未必是知音勸樵夫瞥然撒手向懸崖樹倒藤枯是爛柴盡轉山河歸自己都將風月付平懷擔頭自有千鈞重腳下曾無一線乖樵者如斯真念佛蓮臺不必預安排勸山居人山棲念佛最幽深魚躍澄潭鳥囀林如此樂真境界自然終日好身心雪梅競吐枝頭玉霜橘爭垂葉底金無量壽隨塵剎現衆生多只向西尋淨土詩博山淨心即是西方土雨灑雲蒸分外奇一具骨頭明歷歷振聲也要大家知示達理上人永覺向道西方甚易生祇恐凡心不肯休歇盡凡心歸正覺此心便是渡人舟
