body:
  text: 蓮邦詩選序經云清泰國土寶樹珠網德水珍禽常出清暢和雅之音周徧世界皆演妙法乃是我無量壽如來欲令法音宣流變化所作眾生聞者歡喜無量自然隨順念天戒捨之道自然隨順清淨離欲之行自然隨順六度萬行之法自然隨順無畏不共之力故自他兼利惑業頓除皆得阿䟦致於無上菩提也明萬曆間雲棲妙意菴廣貴輯古今尊宿讚西方勸念佛懷淨土願往生之偈分類撰成蓮華世界詩一盖淨土文錄充棟汗牛此輯又何為也凡詩歌之協於聲律也能沁人肺腑皷人性靈不覺手之舞之足之蹈之者惟詩為然貴師之旨將欲以聲律化人願同彌陀耶而況此方教體清淨在音耳根極利聞慧最圓則何難化娑婆成清泰乎淨願社玄顒長老拾遺增錄一百餘首改其籤曰蓮詩選屬余弁卷自顧蕪拙不敢贊辭略摭法王之神化貴師之苦心玄老之弘願庸規法侶兼以自勗焉古愚居士題原序雲棲會下妙意菴廣貴撰佛言諸佛如來是法界身則遍法界身是阿彌陀佛何淨何穢何樂何苦然淨度三昧經有云人生一念受一身百念受百身千念受千身一日一夜種生死根後當受八億五千萬雜類之身百年中所造魂神逐種受苦遍大千剎土體骨皮毛亦遍大千剎土當其皮毛齒角森然變現時豈復能知遍法界異類身是阿彌陀佛當其鞭笞雨下屠割奏刀時豈復能知遍法界受苦異類身是阿彌陀佛當其鼎烹刀鋸犁耕火炙時豈復能知遍法界餓鬼地獄受苦身是阿彌陀佛豈惟是即儼然而人當其苦難忽逢刀兵乍逼爾時即不能知我輩苦難身是阿彌陀佛豈惟是即快然而得意五欲自娛榮華滿志爾時即不能知我輩受享身是阿彌陀佛夫人世間在順在逆尚不能知此身是阿彌陀佛何況風刀解體八苦交煎之際何況改頭換面羽毛骨角之儔何況焰口針喉鑊湯洋銅之日然後不知我身是阿彌陀佛哉金剛上味經載文殊師利言一切凡夫以自繫縛故見地獄相雖非實有而令受者受苦譬如夢中見身墮地獄萬火所燒擲入鑊湯彼人夢中吼言極苦若知是夢虗妄不實身心得安所以法苑云觀罪性空者罪從心生心若可得罪不可無今塵世中心空者幾人夢破者幾人所以如來教人念一句阿彌陀佛正攝其百念千念八億五千萬雜念於一念念至一念不起自然證見阿彌陀佛然後知一念百念千念八億五千萬雜念皆阿彌陀佛之念然後知一身百身千身八億五千萬雜類之身皆阿彌陀佛之身然後知畜生餓鬼地獄皆阿彌陀佛之法界然則經云一聲阿彌陀佛滅八十億劫生死重罪豈不深切著明矣哉故知一聲阿彌陀佛正是證明無淨無穢之淨土證明無苦無樂之極樂正是空其心之丹藥正是大夢中之霹𮦷也無奈我輩明知是夢却又尋夢明知是夢引我入鐵圍山却又迷昧故鄉道路豈可不用過來人語招之䇿之掖之涵濡之孔子曰興於詩立於禮成於樂三者惟立禮為堅定之力耳而興詩成樂則始終皆以韻事發其歡喜鎔其格扞所以淨土光中不但如來所出音聲皆演玅法其摩尼水流注華間其聲皆演說苦空無常無我諸波羅蜜讚嘆諸佛相好如意珠王湧出金光化為百寶色鳥和鳴哀雅常讚念佛念法念僧樓閣中諸天作天妓樂又樂器懸空不皷自鳴其眾音中皆說念佛念法念比丘僧總之水流光明及諸寶樹鳧鴈鴛鴦皆說玅法所以行者出定入定皆聞玅法夫坐蓮華上者猶藉此音聲以增其進況其未到蓮池者乎小傳載張子房在漢軍中項兵雖挫猶自相持子房乃教軍中作楚歌使楚人懷鄉而漢事遂成可見聲音一道可以補攻取之不及昔賢淨土之詠即子房之還鄉曲也試看詠淨土者多出于宗門之知識其殆佛門之子房也哉蓮詩選年代名號周阿氏多䟦陀羅迦哩迦半託迦晉謝康樂靈運唐善導龐道玄薀呂純陽巖貫休惟岸李青蓮白白香山居易李商隱宋大智元照仙潭若愚長蘆宗賾延壽慧亨慈受懷深冲默樝庵有巖一行宗利蘿月曇瑩雪溪希顏北山可旻一元宗本無名僧文潞公彥博蘇東坡軾黃山谷庭堅丁注古音草庵許自新馮氏法信元中峯明本石屋清珙日觀優曇普度廣製白雲圓信明楚石梵琦笑巖德寶古溪覺澄蓮池袾宏達觀真可度門無際雪嶠圓信博山元來耑愚觀衡頂目弘徹萍踪如曉晦夫大緣丁蓮侶明登沈朗倩大潔妙意廣貴蕅益智旭永覺元賢清百癡聞學實定蓮隱智現鳳翔與楷沈芝塘起潛賀了悟壽昌蓮詩選目錄如來弘願第一一元七首中峯五首妙意三首沈芝塘一首苦勸迴韁第二䟦陀羅一首迦哩迦一首半託迦一首善導一首龐道玄一首貫休一首慈受五首冲默一首北山二首一元九首中峯二十五首石屋一首無名一首優曇六首廣製一首白雲二首楚石六首度門一首雪嶠一首妙意五首蕅益四首蓮隱二首沈芝塘三首翻然嚮往第三謝靈運一首白香山一首李商隱一首蘇東坡二首長蘆一首一元五首許自新一首馮氏一首中峯一首優曇三首楚石一首雪嶠二首耑愚三首沈朗倩一首蕅益二首永覺一首聞學一首蓮隱一首沈芝塘一首一意西馳第四大智一首樝庵二首雪溪九首北山一首一元九首中峯十首日觀九首楚石五首笑巖四首古溪二首耑愚一首晦夫一首丁蓮侶一首沈朗倩二首蕅益五首永覺二首聞學一首沈芝塘二首執持名號第五白香山一首北山七首一元六首古音一首中峯五首優曇八首楚石二首蓮池三首雪嶠一首失名一首頂目二首沈朗倩四首妙意二首蕅益二首永覺四首聞學一首蓮隱二首沈芝塘二首聖境現前第六阿氏多一首呂純陽六首惟岸一首李青蓮一首延壽一首蘿月一首北山六首一元三首中峯五首楚石十三首古溪二首博山三首沈朗倩一首妙意十四首永覺一首聞學一首蓮隱一首發明心地第七慈受一首一元六首草庵一首中峯三十七首優曇二十八首楚石七首達觀二首雪嶠一首博山十一首耑愚十八首晦夫二首萍踪一首沈朗倩一首妙意十三首蕅益三首永覺十六首百癡二首聞學二首蓮隱一首鳳翔四首沈芝塘一首賀壽昌一首華開見佛第八龐道玄一首僊潭二首慈受一首一行一首北山五首一元二首中峯三首博山三首妙意五首永覺一首沈芝塘一首廣度眾生第九文潞公一首一元三首丁注一首中峯二首優曇八首楚石四首博山一首永覺一首
